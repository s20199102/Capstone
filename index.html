<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AP Chemistry Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>AP Chemistry Practice</h1>
    <p class="subtitle">Choose a unit to start practicing. Based on the College Board CED (9 units).</p>
  </header>

  <main>
    <div id="unit-list" class="unit-list">
      <!-- 단원 버튼이 여기에 자동으로 생성됩니다 -->
    </div>

    <a href="quiz.html?unit=all" class="all-button">Practice ALL Units</a>
  </main>

  <script src="questions.js"></script>
  <script>
    // 문제 데이터에서 단원 목록을 자동으로 뽑아냅니다
    const units = [...new Set(questions.map(q => q.unit))].sort();
    const list = document.getElementById("unit-list");

    units.forEach(unit => {
      const count = questions.filter(q => q.unit === unit).length;
      const link = document.createElement("a");
      link.href = "quiz.html?unit=" + encodeURIComponent(unit);
      link.className = "unit-card";
      link.innerHTML = `<span class="unit-name">${unit}</span><span class="unit-count">${count} questions</span>`;
      list.appendChild(link);
    });
  </script>
</body>
</html>
